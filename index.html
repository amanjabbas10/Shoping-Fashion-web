<body>
  <script type="text/javascript">
    // If we were redirected from `public/404.html`, this turns `/?/path` back into `/path`
    // so React Router can handle it (GitHub Pages doesn't support SPA rewrites).
    (function (l) {
      if (l.search[1] === "/") {
        var decoded = l.search
          .slice(1)
          .split("&")
          .map(function (s) {
            return s.replace(/~and~/g, "&");
          })
          .join("?");
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    })(window.location);
  </script>
  <div id="root"></div>

</body>
