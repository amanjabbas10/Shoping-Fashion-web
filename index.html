<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>shoping-web</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
</head>

<body>
  <script type="text/javascript">
    // If we were redirected from `public/404.html`, this turns `/?/path` back into `/path`
    // so React Router can handle it (GitHub Pages doesn't support SPA rewrites).
    (function (l) {
      if (l.search[1] === "/") {
        var decoded = l.search
          .slice(1)
          .split("&")
          .map(function (s) {
            return s.replace(/~and~/g, "&");
          })
          .join("?");
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    })(window.location);
  </script>
  <script type="text/javascript">
    // GitHub Pages project sites live under `%BASE_URL%`. Many components use `<a href="/route">`
    // which would otherwise navigate to `https://<user>.github.io/route` (wrong).
    // This rewrites those hrefs to include the base (e.g. `/Shoping-Fashion-web/route`).
    (function () {
      var BASE_URL = "%BASE_URL%";
      function normalizeBase(base) {
        if (!base) return "/";
        if (base[0] !== "/") base = "/" + base;
        if (base[base.length - 1] !== "/") base = base + "/";
        return base;
      }
      var base = normalizeBase(BASE_URL);
      if (base === "/") return;
      var baseNoTrailing = base.replace(/\/+$/, "");

      function shouldIgnoreHref(href) {
        if (!href) return true;
        if (href[0] === "#") return true;
        if (href.indexOf("mailto:") === 0) return true;
        if (href.indexOf("tel:") === 0) return true;
        if (href.indexOf("//") === 0) return true;
        if (/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(href)) return true;
        return false;
      }

      function rewriteAnchor(a) {
        var href = a.getAttribute("href");
        if (shouldIgnoreHref(href)) return;
        if (href[0] !== "/") return;
        if (href === baseNoTrailing || href.indexOf(baseNoTrailing + "/") === 0) return;
        a.setAttribute("href", baseNoTrailing + href);
      }

      function rewriteAll(root) {
        var anchors = (root || document).querySelectorAll("a[href]");
        for (var i = 0; i < anchors.length; i++) rewriteAnchor(anchors[i]);
      }

      // Initial pass + keep up with React rendering.
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", function () {
          rewriteAll(document);
        });
      } else {
        rewriteAll(document);
      }

      var obs = new MutationObserver(function (mutations) {
        for (var i = 0; i < mutations.length; i++) {
          var m = mutations[i];
          if (m.type === "attributes" && m.target && m.attributeName === "href") {
            rewriteAnchor(m.target);
          } else if (m.type === "childList" && m.addedNodes) {
            for (var j = 0; j < m.addedNodes.length; j++) {
              var node = m.addedNodes[j];
              if (node && node.nodeType === 1) rewriteAll(node);
            }
          }
        }
      });
      obs.observe(document.documentElement, {
        subtree: true,
        childList: true,
        attributes: true,
        attributeFilter: ["href"],
      });
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
